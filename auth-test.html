<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Auth Test (Popup)</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; line-height: 1.5; }
      h1 { margin-top: 0; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
      button { padding: 8px 12px; cursor: pointer; }
      pre { background: #111; color: #d4ffd4; padding: 12px; border-radius: 8px; overflow: auto; }
      .note { color: #555; font-size: 0.95rem; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js?v=auth-test-20260503"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js?v=auth-test-20260503"></script>
  </head>
  <body>
    <h1>Firebase Auth Test (Google Popup)</h1>
    <p class="note">本番 Firebase プロジェクト <strong>neko222-ym</strong> の Auth だけを使う検証ページです。Firestore / Storage は使いません。</p>

    <div class="row">
      <button id="btn-anon">匿名ログイン</button>
      <button id="btn-google">Googleでログイン / リンク</button>
      <button id="btn-signout">ログアウト</button>
      <button id="btn-refresh">現在の認証状態を再取得</button>
    </div>

    <pre id="state">loading...</pre>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyD5YPd4OFIZZzsASOD8Rvv-kNP9hw-2O7o",
        authDomain: "neko222-ym.firebaseapp.com",
        projectId: "neko222-ym",
        appId: "1:355894575292:web:b76f612f2f5cbf8f85f6d4"
      };

      const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth(app);

      const state = {
        projectId: firebaseConfig.projectId,
        authDomain: firebaseConfig.authDomain,
        currentUser: { uid: "", isAnonymous: "", providerIds: "", email: "", displayName: "" },
        lastAction: "",
        lastResult: "",
        errorCode: "",
        errorMessage: "",
        popupStartedAt: "",
        popupFinishedAt: ""
      };

      function syncUser() {
        const user = auth.currentUser;
        state.currentUser.uid = user?.uid || "";
        state.currentUser.isAnonymous = user ? String(!!user.isAnonymous) : "";
        state.currentUser.providerIds = user?.providerData?.map((p) => p.providerId).join(",") || "";
        state.currentUser.email = user?.email || "";
        state.currentUser.displayName = user?.displayName || "";
      }

      function render() {
        syncUser();
        document.getElementById("state").textContent = JSON.stringify({
          projectId: state.projectId,
          authDomain: state.authDomain,
          currentUser: {
            uid: state.currentUser.uid,
            isAnonymous: state.currentUser.isAnonymous,
            providerIds: state.currentUser.providerIds,
            email: state.currentUser.email,
            displayName: state.currentUser.displayName
          },
          lastAction: state.lastAction,
          lastResult: state.lastResult,
          errorCode: state.errorCode,
          errorMessage: state.errorMessage,
          popupStartedAt: state.popupStartedAt,
          popupFinishedAt: state.popupFinishedAt
        }, null, 2);
      }

      function now() {
        return new Date().toISOString();
      }

      async function runAction(name, fn) {
        state.lastAction = name;
        state.lastResult = "running";
        state.errorCode = "";
        state.errorMessage = "";
        try {
          const result = await fn();
          state.lastResult = result || "success";
        } catch (e) {
          state.lastResult = "error";
          state.errorCode = e?.code || "";
          state.errorMessage = e?.message || String(e);
        } finally {
          render();
        }
      }

      async function signInAnonymous() {
        return runAction("signInAnonymously", async () => {
          await auth.signInAnonymously();
          return "anonymous signed in";
        });
      }

      async function googlePopupLoginOrLink() {
        return runAction("googlePopupLoginOrLink", async () => {
          const provider = new firebase.auth.GoogleAuthProvider();
          state.popupStartedAt = now();
          state.popupFinishedAt = "";
          render();

          try {
            if (auth.currentUser?.isAnonymous) {
              await auth.currentUser.linkWithPopup(provider);
              return "anonymous user linked with Google";
            }

            if (!auth.currentUser) {
              try {
                await auth.signInAnonymously();
                if (auth.currentUser?.isAnonymous) {
                  await auth.currentUser.linkWithPopup(provider);
                  return "signed in anonymously then linked with Google";
                }
              } catch (_) {
                // fallback to signInWithPopup
              }
              await auth.signInWithPopup(provider);
              return "signed in with Google popup";
            }

            await auth.signInWithPopup(provider);
            return "existing user re-authenticated/sign-in with Google popup";
          } finally {
            state.popupFinishedAt = now();
          }
        });
      }

      async function signOut() {
        return runAction("signOut", async () => {
          await auth.signOut();
          return "signed out";
        });
      }

      async function refreshAuthState() {
        return runAction("refreshAuthState", async () => {
          await auth.currentUser?.reload?.();
          return "state refreshed";
        });
      }

      document.getElementById("btn-anon").addEventListener("click", signInAnonymous);
      document.getElementById("btn-google").addEventListener("click", googlePopupLoginOrLink);
      document.getElementById("btn-signout").addEventListener("click", signOut);
      document.getElementById("btn-refresh").addEventListener("click", refreshAuthState);

      auth.onAuthStateChanged(() => {
        state.lastAction = state.lastAction || "onAuthStateChanged";
        state.lastResult = state.lastResult || "auth state changed";
        render();
      });

      render();
    </script>
  </body>
</html>
